name: Build Linux binary

# Se déclenche :
#   - automatiquement quand tu pushes un tag vX.Y.Z
#   - manuellement depuis l'onglet Actions de GitHub
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # pour attacher l'artefact à la Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps for PyQt6 and blackbox-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
                                  libcairo2-dev libfreetype6-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Compile blackbox_decode pour Linux depuis les sources officielles.
      - name: Build blackbox_decode (Linux native)
        run: |
          set -e
          git clone --depth 1 https://github.com/betaflight/blackbox-tools.git /tmp/bbtools
          cd /tmp/bbtools
          # On ne build que blackbox_decode — blackbox_render nécessite cairo/freetype
          # et n'est pas utilisé par l'application. Si la cible isolée échoue,
          # fallback sur un make complet.
          make obj/blackbox_decode || make
          mkdir -p "$GITHUB_WORKSPACE/tools"
          if   [ -f obj/blackbox_decode ]; then SRCBIN=obj/blackbox_decode
          elif [ -f bin/blackbox_decode ]; then SRCBIN=bin/blackbox_decode
          elif [ -f blackbox_decode ];     then SRCBIN=blackbox_decode
          else echo "blackbox_decode introuvable après make" && find . -name blackbox_decode && exit 1
          fi
          cp "$SRCBIN" "$GITHUB_WORKSPACE/tools/blackbox_decode"
          chmod +x "$GITHUB_WORKSPACE/tools/blackbox_decode"
          "$GITHUB_WORKSPACE/tools/blackbox_decode" --help | head -3 || true

      # Smoke test : vérifie qu'on peut importer main_window sans NameError/ImportError.
      # Mode offscreen pour que Qt ne cherche pas d'écran sur le runner.
      - name: Smoke test imports
        run: |
          export QT_QPA_PLATFORM=offscreen
          PYTHONPATH=src python -c "import ui.main_window; print('import OK')"

      - name: Build binary with PyInstaller
        run: python build_exe.py

      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf BlackBoxAnalyzer-Linux.tar.gz BlackBoxAnalyzer
          ls -la

      - name: Upload artifact (pour build manuel)
        uses: actions/upload-artifact@v4
        with:
          name: BlackBoxAnalyzer-Linux
          path: dist/BlackBoxAnalyzer-Linux.tar.gz

      - name: Locate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          tag="${{ github.ref_name }}"
          path="RELEASE_NOTES_${tag}.md"
          if [ -f "$path" ]; then
            echo "body_path=$path" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlackBoxAnalyzer-Linux.tar.gz
          fail_on_unmatched_files: true
          body_path: ${{ steps.notes.outputs.body_path }}
          name: BlackBox Analyzer ${{ github.ref_name }}

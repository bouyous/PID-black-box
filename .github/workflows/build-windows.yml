name: Build Windows exe

# Se déclenche :
#   - automatiquement quand tu pushes un tag vX.Y.Z
#   - manuellement depuis l'onglet Actions de GitHub
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write   # pour attacher l'artefact à la Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # blackbox_decode.exe est commité dans le repo (tools/blackbox_decode.exe, 108KB)
      # — plus simple et plus fiable que de le télécharger.
      - name: Verify blackbox_decode.exe
        shell: pwsh
        run: |
          if (-not (Test-Path tools/blackbox_decode.exe)) {
            throw "tools/blackbox_decode.exe manquant dans le repo"
          }
          Get-Item tools/blackbox_decode.exe | Format-List Name,Length

      # Smoke test : vérifie qu'on peut importer main_window sans NameError/ImportError.
      # Évite de publier une release où l'app crashe au lancement (bug v1.6.0-v1.7.3).
      - name: Smoke test imports
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -c "import ui.main_window; print('import OK')"

      - name: Build .exe with PyInstaller
        run: python build_exe.py

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev" }
          Copy-Item dist/BlackBoxAnalyzer.exe "dist/BlackBoxAnalyzer_$tag.exe" -Force
          Get-ChildItem dist

      - name: Upload artifact (pour build manuel)
        uses: actions/upload-artifact@v4
        with:
          name: BlackBoxAnalyzer-Windows
          path: dist/BlackBoxAnalyzer_*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlackBoxAnalyzer_*.exe
          fail_on_unmatched_files: true

name: Build Windows exe

# Se déclenche :
#   - automatiquement quand tu pushes un tag vX.Y.Z
#   - manuellement depuis l'onglet Actions de GitHub
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write   # pour attacher l'artefact à la Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Récupère blackbox_decode.exe depuis la release officielle Betaflight
      - name: Download blackbox_decode.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools | Out-Null
          $url = "https://github.com/betaflight/blackbox-tools/releases/download/0.4.4/blackbox-tools-0.4.4-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile bbtools.zip
          Expand-Archive bbtools.zip -DestinationPath bbtools_extracted -Force
          $exe = Get-ChildItem -Recurse -Filter blackbox_decode.exe bbtools_extracted | Select-Object -First 1
          if (-not $exe) { throw "blackbox_decode.exe introuvable dans l'archive" }
          Copy-Item $exe.FullName tools/blackbox_decode.exe -Force
          tools/blackbox_decode.exe --help | Select-Object -First 3

      - name: Build .exe with PyInstaller
        run: python build_exe.py

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev" }
          Copy-Item dist/BlackBoxAnalyzer.exe "dist/BlackBoxAnalyzer_$tag.exe" -Force
          Get-ChildItem dist

      - name: Upload artifact (pour build manuel)
        uses: actions/upload-artifact@v4
        with:
          name: BlackBoxAnalyzer-Windows
          path: dist/BlackBoxAnalyzer_*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlackBoxAnalyzer_*.exe
          fail_on_unmatched_files: true

name: Build macOS app

# Se déclenche :
#   - automatiquement quand tu pushes un tag vX.Y.Z
#   - manuellement depuis l'onglet Actions de GitHub
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    # Matrice : on build pour les DEUX architectures macOS.
    #   - macos-13 = runner Intel x86_64 (MacBook Pro/Air 2020 et avant)
    #   - macos-14 = runner Apple Silicon arm64 (M1/M2/M3/M4)
    # Chaque job produit un .zip différent attaché à la Release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: Intel
            arch_short: x86_64
          - runner: macos-14
            arch: AppleSilicon
            arch_short: arm64

    runs-on: ${{ matrix.runner }}
    name: Build macOS (${{ matrix.arch }})

    permissions:
      contents: write   # pour attacher l'artefact à la Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show architecture
        run: uname -m

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Compile blackbox_decode pour macOS depuis les sources officielles.
      - name: Build blackbox_decode (macOS native)
        run: |
          set -e
          git clone --depth 1 https://github.com/betaflight/blackbox-tools.git /tmp/bbtools
          cd /tmp/bbtools
          make
          mkdir -p "$GITHUB_WORKSPACE/tools"
          if   [ -f obj/blackbox_decode ]; then SRCBIN=obj/blackbox_decode
          elif [ -f bin/blackbox_decode ]; then SRCBIN=bin/blackbox_decode
          elif [ -f blackbox_decode ];     then SRCBIN=blackbox_decode
          else echo "blackbox_decode introuvable après make" && find . -name blackbox_decode && exit 1
          fi
          cp "$SRCBIN" "$GITHUB_WORKSPACE/tools/blackbox_decode"
          chmod +x "$GITHUB_WORKSPACE/tools/blackbox_decode"
          "$GITHUB_WORKSPACE/tools/blackbox_decode" --help | head -3 || true

      - name: Build .app with PyInstaller
        run: python build_exe.py

      - name: Fix permissions + verify architecture
        run: |
          set -e
          if [ -d "dist/BlackBoxAnalyzer.app" ]; then
            BIN="dist/BlackBoxAnalyzer.app/Contents/MacOS/BlackBoxAnalyzer"
          else
            BIN="dist/BlackBoxAnalyzer"
          fi
          chmod +x "$BIN"
          file "$BIN"
          # Sanity check : l'archi doit correspondre à la matrice
          if ! file "$BIN" | grep -q "${{ matrix.arch_short }}"; then
            echo "⚠️  Le binaire n'a pas l'archi attendue (${{ matrix.arch_short }})"
            file "$BIN"
          fi

      - name: Package .app + fix_mac script as .zip
        run: |
          cp fix_mac_standalone.sh dist/fix_mac.sh
          chmod +x dist/fix_mac.sh

          cat > dist/LISEZ-MOI.txt <<'EOF'
          BlackBox Analyzer — Installation Mac
          =====================================

          Vous venez de dézipper BlackBoxAnalyzer-macOS-${{ matrix.arch }}.zip.

          ÉTAPE 1 (une seule fois, pour débloquer Gatekeeper) :
            - Ouvrez Terminal (Applications → Utilitaires → Terminal).
            - Glissez-déposez le fichier fix_mac.sh dans la fenêtre du Terminal.
            - Appuyez sur Entrée.

          ALTERNATIVE sans script, en une ligne dans Terminal :
            xattr -cr ~/Downloads/BlackBoxAnalyzer.app

          ÉTAPE 2 :
            Double-cliquez sur BlackBoxAnalyzer.app pour lancer l'app.

          ARCHITECTURE :
            Ce zip est compilé pour : ${{ matrix.arch }} (${{ matrix.arch_short }}).
            Pour vérifier votre Mac : dans Terminal, tapez "uname -m".
              - "arm64"  → téléchargez BlackBoxAnalyzer-macOS-AppleSilicon.zip
              - "x86_64" → téléchargez BlackBoxAnalyzer-macOS-Intel.zip

          Si "blackbox_decode introuvable" apparaît :
            brew install blackbox-tools
          EOF

          cd dist
          ZIPNAME="BlackBoxAnalyzer-macOS-${{ matrix.arch }}.zip"
          if [ -d "BlackBoxAnalyzer.app" ]; then
            zip -ry "$ZIPNAME" BlackBoxAnalyzer.app fix_mac.sh LISEZ-MOI.txt
          else
            zip -j "$ZIPNAME" BlackBoxAnalyzer fix_mac.sh LISEZ-MOI.txt
          fi
          ls -la

      - name: Upload artifact (pour build manuel)
        uses: actions/upload-artifact@v4
        with:
          name: BlackBoxAnalyzer-macOS-${{ matrix.arch }}
          path: dist/BlackBoxAnalyzer-macOS-${{ matrix.arch }}.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlackBoxAnalyzer-macOS-${{ matrix.arch }}.zip
          fail_on_unmatched_files: true

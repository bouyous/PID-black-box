name: Build macOS app

# Se déclenche :
#   - automatiquement quand tu pushes un tag vX.Y.Z
#   - manuellement depuis l'onglet Actions de GitHub
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    # macos-latest = Apple Silicon (M1/M2), gratuit sur repo public
    runs-on: macos-latest

    permissions:
      contents: write   # pour attacher l'artefact à la Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Compile blackbox_decode pour macOS depuis les sources officielles.
      # C'est un petit outil en C, compile en < 30 s avec make.
      - name: Build blackbox_decode (macOS native)
        run: |
          set -e
          git clone --depth 1 https://github.com/betaflight/blackbox-tools.git /tmp/bbtools
          cd /tmp/bbtools
          # make (sans arg) build toutes les cibles avec les bonnes deps.
          # `make blackbox_decode` seul ne linke pas imu/gpx/stream/tools/units.
          make
          mkdir -p "$GITHUB_WORKSPACE/tools"
          # Le binaire peut être à la racine (obj/) ou dans bin/ selon version
          if   [ -f obj/blackbox_decode ]; then SRCBIN=obj/blackbox_decode
          elif [ -f bin/blackbox_decode ]; then SRCBIN=bin/blackbox_decode
          elif [ -f blackbox_decode ];     then SRCBIN=blackbox_decode
          else echo "blackbox_decode introuvable après make" && find . -name blackbox_decode && exit 1
          fi
          cp "$SRCBIN" "$GITHUB_WORKSPACE/tools/blackbox_decode"
          chmod +x "$GITHUB_WORKSPACE/tools/blackbox_decode"
          "$GITHUB_WORKSPACE/tools/blackbox_decode" --help | head -3 || true

      - name: Build .app with PyInstaller
        run: |
          python build_exe.py

      - name: Package .app + fix_mac script as .zip
        run: |
          # On copie le script de déblocage Gatekeeper à côté du .app pour que
          # l'utilisateur n'ait pas besoin du repo complet.
          cp fix_mac_standalone.sh dist/fix_mac.sh
          chmod +x dist/fix_mac.sh

          # README court livré dans le .zip
          cat > dist/LISEZ-MOI.txt <<'EOF'
          BlackBox Analyzer — Installation Mac
          =====================================

          Vous venez de dézipper BlackBoxAnalyzer-macOS.zip.

          ÉTAPE 1 (une seule fois, pour débloquer Gatekeeper) :
            - Ouvrez Terminal (Applications → Utilitaires → Terminal).
            - Glissez-déposez le fichier fix_mac.sh dans la fenêtre du Terminal.
            - Appuyez sur Entrée.

          ALTERNATIVE sans script, en une ligne dans Terminal :
            xattr -cr ~/Downloads/BlackBoxAnalyzer.app

          ÉTAPE 2 :
            Double-cliquez sur BlackBoxAnalyzer.app pour lancer l'app.

          Si "blackbox_decode introuvable" apparaît :
            brew install blackbox-tools
          EOF

          cd dist
          if [ -d "BlackBoxAnalyzer.app" ]; then
            zip -ry BlackBoxAnalyzer-macOS.zip BlackBoxAnalyzer.app fix_mac.sh LISEZ-MOI.txt
          else
            zip -j BlackBoxAnalyzer-macOS.zip BlackBoxAnalyzer fix_mac.sh LISEZ-MOI.txt
          fi
          ls -la

      - name: Upload artifact (pour build manuel)
        uses: actions/upload-artifact@v4
        with:
          name: BlackBoxAnalyzer-macOS
          path: dist/BlackBoxAnalyzer-macOS.zip

      # Si le workflow tourne suite à un push de tag → on attache à la Release
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlackBoxAnalyzer-macOS.zip
          fail_on_unmatched_files: true
